set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix

# Reload tmux config
unbind r
bind r source-file ~/.tmux.conf \; display-message 'tmux.conf reloaded (plugins sourced)'


# Configs
set -g history-limit 100000
set-window-option -g mode-keys vi
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features "*:RGB"
set -g base-index 1
set -g renumber-windows on
set -g extended-keys on
setw -g mouse on
set -g extended-keys-format csi-u

# set -g status-style fg="#EBDBB2",bg=default
set -g status-right "%H:%M %a %d-%m-%Y"
set -g status-justify centre
set -g status-left-length 50
set -g status-interval 1
# set -g status-position top
# set-window-option -g window-status-format "#{window_index}:#{window_name}"
# set-window-option -g window-status-current-format "#{window_index}:#{window_name}#{?window_zoomed_flag,,}"
# set-window-option -g window-status-current-style fg="#dc8a78"

# Panes & Windows
unbind w
unbind %
bind _ split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind C-\\

# Move between panes
bind-key , prev
bind-key . next

# Change between workspaces
unbind n
bind-key n switch-client -l

# Move between panes
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# Resize panes
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r H resize-pane -L 10
bind-key -r L resize-pane -R 10

# Maximize pane
bind-key m resize-pane -Z

# 'v' to begin selection in copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'Space' send -X clear-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe "pbcopy"

# Personal key-bindings
bind-key o run-shell "tmux neww 'tmux-sessions'"
bind-key p display-popup -E -w 80% -h 80% -d "#{pane_current_path}"


# No delay for escape key press
set -s escape-time 0

# plugins
set -g @yank_with_mouse off

##### Plugins ##################################################################
# Add plugins as "owner/repo" — cloned from GitHub on first load.
# To remove a plugin: delete its line and rm -rf ~/.tmux/plugins/<name>
run-shell '
PLUGINS=(
  vieitesss/gruber-darker-tmux-theme
)
PLUGDIR="$HOME/.tmux/plugins"
mkdir -p "$PLUGDIR"
for repo in "${PLUGINS[@]}"; do
  name="${repo##*/}"
  dir="$PLUGDIR/$name"
  if [ -d "$dir" ]; then git -C "$dir" pull --ff-only -q; else git clone --depth=1 "https://github.com/$repo" "$dir"; fi
  [ -f "$dir/$name.tmux" ] && tmux source-file "$dir/$name.tmux"
done
exit 0
'
