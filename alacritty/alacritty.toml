[general]
import = [
    "./themes/themes/umbraline.toml",
]

[env]
TERM                   = "screen-256color"
WINIT_X11_SCALE_FACTOR = "1.25"

[font]
size = 18

normal.family = "Terminess Nerd Font Mono"

[mouse]
hide_when_typing = true

[terminal.shell]
program = "/bin/zsh"

[window]
decorations_theme_variant = "Dark"
dynamic_padding           = false
startup_mode              = "Windowed"

[window.class]
general  = "Alacritty"
instance = "Alacritty"


